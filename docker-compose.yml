services:
  pm3u-dashboard:
    build:
      context: .
    container_name: pm3u-dashboard
    ports:
      - "5000:5000"
    environment:
      PM3U_DATA_DIR: /app/data
      PM3U_HOST: 0.0.0.0
      PM3U_PORT: 5000
      PM3U_DEBUG: 0
    volumes:
      - ./data:/app/data
    restart: unless-stopped
